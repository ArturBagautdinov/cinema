services:
  postgres:
    image: postgres:16
    container_name: PgLab
    command:
      - postgres
      - -c
      - shared_preload_libraries=pg_stat_statements
      - -c
      - compute_query_id=auto
    environment:
      POSTGRES_DB: CinemaMigr
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5444:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d CinemaMigr"]
      interval: 5s
      timeout: 5s
      retries: 20

  flyway:
    image: flyway/flyway:10
    container_name: flyway_lab
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      -url=jdbc:postgresql://postgres:5432/CinemaMigr
      -user=postgres
      -password=postgres
      -connectRetries=60
      migrate
    volumes:
      - ./migrations:/flyway/sql

  postgres_exporter:
    image: quay.io/prometheuscommunity/postgres-exporter:v0.19.1
    container_name: postgres_exporter
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATA_SOURCE_NAME: "postgresql://postgres_exporter:secret@postgres:5432/postgres?sslmode=disable"
    ports:
      - "9187:9187"

  process_exporter:
    image: ncabatoff/process-exporter:v0.8.7
    container_name: process_exporter
    privileged: true
    command:
      - --procfs
      - /host/proc
      - -config.path
      - /config/process-exporter.yml
    volumes:
      - /proc:/host/proc:ro
      - ./monitoring/process-exporter.yml:/config/process-exporter.yml:ro
    ports:
      - "9256:9256"

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    depends_on:
      - postgres_exporter
      - process_exporter
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    depends_on:
      - prometheus
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana

volumes:
  pgdata:
  grafana_data: