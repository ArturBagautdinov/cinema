services:
  postgres-primary:
    image: postgres:16
    container_name: PgPrimary
    command:
      - postgres
      - -c
      - shared_preload_libraries=pg_stat_statements
      - -c
      - compute_query_id=auto
      - -c
      - wal_level=logical
      - -c
      - max_wal_senders=10
      - -c
      - max_replication_slots=10
      - -c
      - hot_standby=on
      - -c
      - listen_addresses=*
    environment:
      POSTGRES_DB: CinemaMigr
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5444:5432"
    volumes:
      - pgdata_primary:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d CinemaMigr"]
      interval: 5s
      timeout: 5s
      retries: 20

  postgres-replica1:
    image: postgres:16
    container_name: PgReplica1
    depends_on:
      postgres-primary:
        condition: service_healthy
    environment:
      PGPASSWORD: pass
    ports:
      - "5445:5432"
    volumes:
      - pgdata_replica1:/var/lib/postgresql/data
      - ./replication/replica/setup-replica.sh:/setup-replica.sh
    entrypoint: ["/bin/bash", "/setup-replica.sh", "replica1"]

  postgres-replica2:
    image: postgres:16
    container_name: PgReplica2
    depends_on:
      postgres-primary:
        condition: service_healthy
    environment:
      PGPASSWORD: pass
    ports:
      - "5446:5432"
    volumes:
      - pgdata_replica2:/var/lib/postgresql/data
      - ./replication/replica/setup-replica.sh:/setup-replica.sh
    entrypoint: ["/bin/bash", "/setup-replica.sh", "replica2"]

  postgres-logical:
    image: postgres:16
    container_name: PgLogicalSub
    environment:
      POSTGRES_DB: CinemaMigr
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5447:5432"
    volumes:
      - pgdata_logical:/var/lib/postgresql/data

  flyway:
    image: flyway/flyway:10
    container_name: flyway_lab
    depends_on:
      postgres-primary:
        condition: service_healthy
    command: >
      -url=jdbc:postgresql://postgres-primary:5432/CinemaMigr
      -user=postgres
      -password=postgres
      -connectRetries=60
      migrate
    volumes:
      - ./migrations:/flyway/sql

  postgres_exporter:
    image: quay.io/prometheuscommunity/postgres-exporter:v0.19.1
    container_name: postgres_exporter
    depends_on:
      postgres-primary:
        condition: service_healthy
    environment:
      DATA_SOURCE_NAME: "postgresql://postgres_exporter:secret@postgres-primary:5432/postgres?sslmode=disable"
    ports:
      - "9187:9187"

  process_exporter:
    image: ncabatoff/process-exporter:v0.8.7
    container_name: process_exporter
    privileged: true
    command:
      - --procfs
      - /host/proc
      - -config.path
      - /config/process-exporter.yml
    volumes:
      - /proc:/host/proc:ro
      - ./monitoring/process-exporter.yml:/config/process-exporter.yml:ro
    ports:
      - "9256:9256"

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    depends_on:
      - postgres_exporter
      - process_exporter
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    depends_on:
      - prometheus
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana

volumes:
  pgdata_primary:
  pgdata_replica1:
  pgdata_replica2:
  pgdata_logical:
  grafana_data: